[colors.primary]
background = "#000000"

[font]
size = 14

[font.normal]
family = "JetBrainsMono Nerd Font"

[font.bold]
family = "JetBrainsMono Nerd Font"

[font.italic]
family = "JetBrainsMono Nerd Font"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"

[window]
opacity = 0.95

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
